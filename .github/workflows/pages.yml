name: Deploy Demo

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Yo compiler
        run: npm install -g @shd101wyy/yo

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "4.0.12"

      - name: Build WASM API
        run: |
          yo build wasm_api
          cp yo-out/wasm32-emscripten/bin/markdown_yo_wasm_api.js   demo/markdown_yo_wasm_api.js
          cp yo-out/wasm32-emscripten/bin/markdown_yo_wasm_api.wasm demo/markdown_yo_wasm_api.wasm

      - name: Delete old github-pages artifact
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId
            });
            
            for (const artifact of artifacts.data.artifacts) {
              if (artifact.name === 'github-pages') {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id
                });
                console.log(`Deleted old artifact ${artifact.id}`);
              }
            }

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
