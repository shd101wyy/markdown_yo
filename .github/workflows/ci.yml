name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install liburing
        run: |
          sudo apt-get update
          sudo apt-get install -y liburing-dev

      - name: Install Yo compiler
        run: npm install -g @shd101wyy/yo

      - name: Install JS test dependencies
        run: npm install

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "4.0.12"

      - name: Build
        run: |
          yo build
          yo build wasm

      - name: Fixture tests & benchmark
        run: |
          node scripts/run_fixture_tests.js
          node benchmark/generate_samples.js
          node benchmark/run.js
